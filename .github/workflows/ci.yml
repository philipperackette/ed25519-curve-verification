name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show compiler version
        run: g++ --version

      - name: Compile
        run: |
          g++ -std=c++17 -O2 -Wall -Wextra -pedantic -o ed25519_verify ed25519_verify.cpp

      - name: Run generator-only check
        run: |
          echo "=== generator-only ==="
          ./ed25519_verify --generator-only | tee generator_only.log

      - name: Run small test
        run: |
          echo "=== small-test ==="
          ./ed25519_verify --small-test | tee small_test.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            generator_only.log
            small_test.log
